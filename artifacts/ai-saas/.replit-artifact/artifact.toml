kind = "web"
previewPath = "/"
title = "AI SaaS Toolkit"
version = "1.0.0"
id = "artifacts/ai-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22575
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-saas run dev"

[services.env]
PORT = "22575"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-saas", "run", "build"]
publicDir = "artifacts/ai-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
